<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的自制导航</title>
    <style>
        /* --- 基础样式复位 --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }
        body, html {
            width: 100%;
            height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            overflow: hidden;
            background-color: #000;
        }

        /* --- 背景层设计（修复高度塌陷问题） --- */
        #background-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background-position: center;
            background-size: cover;
            background-repeat: no-repeat;
        }
        .bg-media {
            width: 100%;
            height: 100%;
            object-fit: cover;
            pointer-events: none;
            display: block;
        }

        /* --- 主体布局 --- */
        .main-wrapper {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        /* --- 大标题 --- */
        .site-title {
            font-size: 3.5rem;
            color: #ffffff;
            font-weight: 300;
            margin-bottom: 2.2rem;
            letter-spacing: 6px;
            text-shadow: 0 4px 12px rgba(0, 0, 0, 0.5);
        }

        /* --- 搜索组件容器 --- */
        .search-box-container {
            position: relative;
            width: 100%;
            max-width: 680px;
            display: flex;
            align-items: center;
            /* 极简毛玻璃特效 */
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 32px;
            padding: 6px 10px 6px 14px;
            box-shadow: 0 10px 32px rgba(0, 0, 0, 0.3);
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        }
        .search-box-container:focus-within {
            background: rgba(255, 255, 255, 0.15);
            border-color: rgba(255, 255, 255, 0.4);
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.45);
            transform: translateY(-2px);
        }

        /* --- 搜索引擎选择按钮 --- */
        .engine-selector {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 8px 12px;
            cursor: pointer;
            color: #fff;
            font-size: 0.95rem;
            border-radius: 20px;
            transition: background 0.2s;
            flex-shrink: 0;
        }
        .engine-selector:hover {
            background: rgba(255, 255, 255, 0.15);
        }
        .engine-icon {
            width: 18px;
            height: 18px;
            object-fit: contain;
            border-radius: 4px;
        }

        /* --- 输入框 --- */
        .search-input {
            flex: 1;
            background: none;
            border: none;
            outline: none;
            padding: 10px 12px;
            color: #fff;
            font-size: 1.1rem;
            width: 100%;
        }
        .search-input::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }

        /* --- 右侧功能按钮通用样式 --- */
        .action-btn {
            width: 36px;
            height: 36px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            border-radius: 50%;
            color: rgba(255, 255, 255, 0.65);
            transition: all 0.2s;
            flex-shrink: 0;
        }
        .action-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            color: #fff;
        }

        /* --- 一键清空按钮特有样式 --- */
        .clear-btn {
            opacity: 0;
            pointer-events: none;
            margin-right: 2px;
        }
        .clear-btn.show {
            opacity: 1;
            pointer-events: auto;
        }

        /* --- 搜索按钮特有样式 --- */
        .search-btn {
            color: rgba(255, 255, 255, 0.85);
        }

        /* --- 弹出的搜索引擎面板 --- */
        .engine-dropdown {
            position: absolute;
            top: calc(100% + 12px);
            left: 0;
            width: 100%;
            background: rgba(15, 15, 15, 0.7);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 20px;
            padding: 18px;
            box-shadow: 0 15px 45px rgba(0, 0, 0, 0.6);
            display: none;
            flex-direction: column;
            gap: 16px;
            z-index: 100;
        }
        .engine-dropdown.show {
            display: flex;
            animation: fadeIn 0.2s ease-out;
        }

        /* 分类行 */
        .category-row {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .category-title {
            font-size: 0.75rem;
            color: rgba(255, 255, 255, 0.4);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            padding-left: 4px;
        }
        .engine-list {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }
        .engine-item {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 6px 14px;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.04);
            color: rgba(255, 255, 255, 0.85);
            border-radius: 14px;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.2s;
        }
        .engine-item:hover {
            background: rgba(255, 255, 255, 0.2);
            color: #fff;
            border-color: rgba(255, 255, 255, 0.15);
        }

        /* 动画效果 */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div id="background-container"></div>

    <div class="main-wrapper">
        <h1 class="site-title" id="site-title">NAVIGATOR</h1>

        <div class="search-box-container">
            <div class="engine-selector" id="engine-selector">
                <span id="current-engine-icon-slot"></span>
                <span id="current-engine-name">百度</span>
                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 9l6 6 6-6"/></svg>
            </div>

            <input type="text" class="search-input" id="search-input" placeholder="输入搜索内容..." autocomplete="off">

            <div class="action-btn clear-btn" id="clear-btn" title="清空内容">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
            </div>

            <div class="action-btn search-btn" id="search-btn" title="点击搜索">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
            </div>

            <div class="engine-dropdown" id="engine-dropdown"></div>
        </div>
    </div>

    <script>
        // ==========================================
        //  核心可自定义配置项
        // ==========================================
        const CONFIG = {
            title: "SPACE", // 主页居中大标题
            background: {
                type: "image", // 支持 "image" 或 "video"
                url: "https://images.wallpaperscraft.com/image/single/photographer_camera_dark_133781_1280x720.jpg" // 确保你的图片文件名和仓库里完全一致
            },
            categories: [
                {
                    name: "常用搜索",
                    engines: [
                        { name: "百度", url: "https://www.baidu.com/s?wd=", icon: "https://favicon.yandex.net/favicon/baidu.com" },
                        { name: "谷歌", url: "https://www.google.com/search?q=", icon: "https://favicon.yandex.net/favicon/google.com" }
                    ]
                },
                {
                    name: "影音视界",
                    engines: [
                        { name: "哔哩哔哩", url: "https://search.bilibili.com/all?keyword=", icon: "https://favicon.yandex.net/favicon/bilibili.com" },
                        { name: "抖音", url: "https://www.douyin.com/search?keyword=", icon: "" } 
                    ]
                },
                {
                    name: "生活购物",
                    engines: [
                        { name: "淘宝", url: "https://s.taobao.com/search?q=", icon: "" },
                        { name: "京东", url: "https://search.jd.com/Search?keyword=", icon: "https://favicon.yandex.net/favicon/jd.com" }
                    ]
                }
            ]
        };

        // ==========================================
        //  业务逻辑核心控制
        // ==========================================
        let currentEngine = CONFIG.categories[0].engines[0]; 

        function initPage() {
            // 1. 设置标题
            document.getElementById('site-title').innerText = CONFIG.title;

            // 2. 修复后的背景渲染逻辑
            const bgContainer = document.getElementById('background-container');
            if (CONFIG.background.type === 'video') {
                bgContainer.style.backgroundImage = 'none';
                bgContainer.innerHTML = `<video class="bg-media" autoplay loop muted playsinline src="${CONFIG.background.url}"></video>`;
            } else {
                bgContainer.innerHTML = ''; // 清空可能存在的视频
                bgContainer.style.backgroundImage = `url('${CONFIG.background.url}')`;
            }

            // 3. 动态渲染引擎分类面板
            const dropdown = document.getElementById('engine-dropdown');
            CONFIG.categories.forEach(cat => {
                const row = document.createElement('div');
                row.className = 'category-row';
                
                const title = document.createElement('div');
                title.className = 'category-title';
                title.innerText = cat.name;
                row.appendChild(title);

                const list = document.createElement('div');
                list.className = 'engine-list';

                cat.engines.forEach(eng => {
                    const item = document.createElement('div');
                    item.className = 'engine-item';
                    
                    const iconHtml = eng.icon ? `<img src="${eng.icon}" class="engine-icon" onerror="this.style.display='none'">` : '';
                    item.innerHTML = `${iconHtml}<span>${eng.name}</span>`;
                    
                    item.addEventListener('click', (e) => {
                        e.stopPropagation();
                        updateCurrentEngine(eng);
                        dropdown.classList.remove('show');
                        document.getElementById('search-input').focus();
                    });
                    list.appendChild(item);
                });

                row.appendChild(list);
                dropdown.appendChild(row);
            });

            // 4. 初始化默认引擎
            updateCurrentEngine(currentEngine);
        }

        function updateCurrentEngine(engine) {
            currentEngine = engine;
            document.getElementById('current-engine-name').innerText = engine.name;
            const iconSlot = document.getElementById('current-engine-icon-slot');
            
            if (engine.icon) {
                iconSlot.innerHTML = `<img src="${engine.icon}" class="engine-icon" onerror="this.style.display='none'">`;
            } else {
                iconSlot.innerHTML = ''; 
            }
        }

        function triggerSearch() {
            const query = searchInput.value.trim();
            if (query) {
                window.open(currentEngine.url + encodeURIComponent(query), '_blank');
            }
        }

        // ==========================================
        //  事件监听
        // ==========================================
        const searchInput = document.getElementById('search-input');
        const clearBtn = document.getElementById('clear-btn');
        const searchBtn = document.getElementById('search-btn');
        const engineSelector = document.getElementById('engine-selector');
        const dropdown = document.getElementById('engine-dropdown');

        searchInput.addEventListener('input', () => {
            if (searchInput.value.trim().length > 0) {
                clearBtn.classList.add('show');
            } else {
                clearBtn.classList.remove('show');
            }
        });

        clearBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            searchInput.value = '';
            clearBtn.classList.remove('show');
            searchInput.focus();
        });

        searchBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            triggerSearch();
        });

        searchInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                triggerSearch();
            }
        });

        engineSelector.addEventListener('click', (e) => {
            e.stopPropagation();
            dropdown.classList.toggle('show');
        });

        document.addEventListener('click', () => {
            dropdown.classList.remove('show');
        });

        window.addEventListener('DOMContentLoaded', initPage);
    </script>
</body>
</html>
